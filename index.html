<script>
window.SENSORS = [
  { key:'light',    name:'빛',       unit:'lux',    base:420,  amp:90,  freq:0.15, color:'#f6b93b', file:'S_03_light_V8_0414_Y축오류수정.html',      desc:'주변 광량(조도)을 실시간으로 측정합니다. 실내 일반 조명은 보통 200~500 lux, 야외 직사광선은 10,000 lux 이상입니다.', icon:'M12 4 V7 M12 17 V20 M4 12 H7 M17 12 H20 M6.3 6.3 L8.4 8.4 M15.6 15.6 L17.7 17.7 M6.3 17.7 L8.4 15.6 M15.6 8.4 L17.7 6.3 M12 9 a3 3 0 1 1 0 6 3 3 0 1 1 0 -6' },

  { key:'co2',      name:'CO₂',      unit:'ppm',    base:450,  amp:80,  freq:0.03, color:'#18a04a', file:'S_25_CO2_V4_0414_Y축오류수정.html',        desc:'이산화탄소 농도(ppm)를 측정합니다. 실외 공기는 보통 약 400 ppm, 밀폐된 실내가 1000 ppm 이상이면 환기가 필요합니다.', icon:'M4 12 a2 2 0 1 0 4 0 2 2 0 1 0 -4 0 M10 12 a2 2 0 1 0 4 0 2 2 0 1 0 -4 0 M16 12 a2 2 0 1 0 4 0 2 2 0 1 0 -4 0' },

  { key:'voltage',  name:'전압',     unit:'V',      base:5.0,  amp:0.6, freq:0.3,  color:'#ffc107', file:'S_17_voltage_V1_0421.html',               desc:'두 지점 사이의 전위차를 측정합니다. 전지의 기전력, 내부 저항 탐구 등에 활용됩니다.', icon:'M5 7 L10 17 L14 10 L19 17' },
  { key:'induced',  name:'유도전류', unit:'mA',     base:0,    amp:15,  freq:0.6,  color:'#d946ef', file:'S_18_DIY-A_유도전류_V1_0421.html',         desc:'DIY-A 센서로 전자기 유도에 의해 발생하는 미세 전류를 측정합니다. 패러데이 법칙, 렌츠 법칙 실험에 활용됩니다.', icon:'M4 6 V18 M4 6 H8 M4 12 H8 M4 18 H8 M12 6 C 14 6, 14 18, 16 18 C 18 18, 18 6, 20 6 M14 4 V8 M18 16 V20' },
  { key:'conduct',  name:'전도도',   unit:'μS/cm',  base:450,  amp:50,  freq:0.15, color:'#06b6d4', file:'S_19_DIY-B_전도도_V1_0421.html',           desc:'DIY-B 센서로 용액의 전기 전도도를 측정합니다. 이온화도, 용해도, 전해질 실험에 활용됩니다.', icon:'M6 4 V14 a3 3 0 1 0 6 0 V4 M4 4 H8 M10 4 H14 M16 8 V18 M14 8 H18 M13 14 H19' },

  { key:'dust',     name:'미세먼지', unit:'μg/m³',  base:32,   amp:15,  freq:0.08, color:'#8b877d', file:'S_10_dust_V6_0414_Y축오류수정.html',       desc:'공기 중 미세 입자 농도를 측정합니다. "좋음"은 0~30, "보통"은 31~80, "나쁨"은 81 이상입니다.', icon:'M5 8 a2 2 0 1 1 4 0 2 2 0 1 1 -4 0 M15 7 a1.5 1.5 0 1 1 3 0 1.5 1.5 0 1 1 -3 0 M9 14 a2 2 0 1 1 4 0 2 2 0 1 1 -4 0 M16 15 a1.5 1.5 0 1 1 3 0 1.5 1.5 0 1 1 -3 0' }

<style>
:root {
  --bg: #f4f1ea;
  --bg-alt: #ece8de;
  --ink: #161613;
  --ink-soft: #44423c;
  --ink-mute: #8b877d;
  --line: #d5d0c3;
  --line-soft: #e3dfd3;
  --paper: #faf8f3;
  --accent: #1a37ff;
  --accent-soft: #dbdfff;
  --warn: #e8431f;

  --font-kr: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
  --font-display: "Fraunces", "Pretendard Variable", serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  --radius: 14px;
  --radius-lg: 22px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: var(--font-kr);
  background: var(--bg);
  color: var(--ink);
  font-feature-settings: "ss01", "ss02";
  background-image: radial-gradient(circle, rgba(22,22,19,0.055) 1px, transparent 1px);
  background-size: 22px 22px;
  background-position: 0 0;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 32px;
}

/* ═══════════ NAVIGATION ═══════════ */
nav.top {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px) saturate(1.2);
  background: rgba(244, 241, 234, 0.78);
  border-bottom: 1px solid var(--line);
}
nav.top .wrap {
  max-width: 1240px;
  margin: 0 auto;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 40px;
}
nav.top .logo {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
nav.top .logo .dot {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 0 3px var(--accent-soft);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.85; }
}
nav.top ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  gap: 28px;
  font-size: 14px;
  font-weight: 500;
}
nav.top ul a {
  color: var(--ink-soft);
  text-decoration: none;
  transition: color 0.2s;
  position: relative;
  cursor: pointer;
}
nav.top ul a:hover { color: var(--ink); }
nav.top ul a.active { color: var(--ink); }
nav.top ul a.active::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  bottom: -6px;
  height: 2px;
  background: var(--accent);
}
nav.top .email {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--ink-soft);
  text-decoration: none;
  padding: 7px 13px;
  border: 1px solid var(--line);
  border-radius: 999px;
  transition: all 0.2s;
}
nav.top .email:hover {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}

/* Q&A tooltip */
nav.top li.has-tip { position: relative; }
nav.top li.has-tip .tip {
  position: absolute;
  top: calc(100% + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(-4px);
  background: #ffffff;
  color: var(--ink);
  padding: 12px 16px 13px;
  border-radius: 10px;
  border: 1px solid var(--line);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
  box-shadow: 0 10px 30px rgba(22, 22, 19, 0.12);
  z-index: 10;
}
nav.top li.has-tip:hover .tip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
nav.top li.has-tip .tip-label {
  font-family: var(--font-kr);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
nav.top li.has-tip .tip-code {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--ink);
}
nav.top li.has-tip .tip-arrow {
  position: absolute;
  top: -6px;
  left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 10px;
  height: 10px;
  background: #ffffff;
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
  border-radius: 2px;
}

/* ═══════════ HERO ═══════════ */
.hero {
  padding: 90px 0 60px;
  position: relative;
}
.hero .eyebrow {
  font-family: var(--font-mono);
  font-size: 11.5px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}
.hero .eyebrow::before {
  content: '';
  width: 34px; height: 1px;
  background: var(--ink);
}
.hero h1 {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: clamp(42px, 6.2vw, 84px);
  line-height: 1.02;
  letter-spacing: -0.03em;
  margin: 0 0 12px;
  font-variation-settings: "opsz" 144;
}
.hero h1 .italic {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.hero h2 {
  font-family: var(--font-kr);
  font-size: clamp(18px, 1.9vw, 22px);
  font-weight: 500;
  color: var(--ink-soft);
  margin: 28px 0 0;
  max-width: 720px;
  line-height: 1.55;
  letter-spacing: -0.01em;
}
.hero h2 .sep {
  color: var(--line);
  margin: 0 10px;
  font-weight: 300;
}
.hero-meta {
  position: absolute;
  top: 110px;
  right: 32px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  text-align: right;
  line-height: 1.8;
}
.hero-meta .row { display: flex; gap: 12px; justify-content: flex-end; }
.hero-meta .label { color: var(--ink-mute); }
.hero-meta .val { color: var(--ink); }

/* ═══════════ CONCEPT CARDS ═══════════ */
.concepts {
  padding: 40px 0 100px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.concept {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 24px 22px 22px;
  position: relative;
  transition: transform 0.25s, border-color 0.25s;
  overflow: hidden;
}
.concept:hover { transform: translateY(-3px); border-color: var(--ink); }
.concept .num {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}
.concept .icon { width: 38px; height: 38px; margin-bottom: 16px; color: var(--ink); }
.concept .title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.45;
  letter-spacing: -0.01em;
}
.concept .title span { color: var(--accent); }

/* ═══════════ SECTION HEADERS ═══════════ */
section.block {
  padding: 80px 0;
  border-top: 1px solid var(--line);
}
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 44px;
  gap: 32px;
}
.section-head h2 {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: clamp(32px, 4.4vw, 52px);
  letter-spacing: -0.025em;
  margin: 0;
  line-height: 1;
}
.section-head .idx {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
}
.section-head .desc {
  font-size: 14px;
  color: var(--ink-soft);
  max-width: 380px;
  text-align: right;
  line-height: 1.6;
}

/* ═══════════ DASHBOARD BANNER CARDS ═══════════ */
.dash-banners {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.dash-banner {
  background: var(--ink);
  color: var(--paper);
  border-radius: var(--radius-lg);
  padding: 28px 30px;
  display: flex;
  align-items: center;
  gap: 22px;
  cursor: pointer;
  transition: transform 0.25s;
  position: relative;
  overflow: hidden;
  text-decoration: none;
}
.dash-banner:hover { transform: translateY(-3px); }
.dash-banner.alt { background: var(--accent); }
.dash-banner .glyph {
  width: 54px; height: 54px;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 12px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.dash-banner .glyph svg { width: 26px; height: 26px; }
.dash-banner .text h3 {
  margin: 0 0 4px;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.dash-banner .text p {
  margin: 0;
  font-size: 13px;
  opacity: 0.75;
  font-family: var(--font-mono);
}
.dash-banner .arrow { margin-left: auto; font-size: 22px; transition: transform 0.25s; }
.dash-banner:hover .arrow { transform: translateX(5px); }

/* ═══════════ SENSOR GRID ═══════════ */
.sensor-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}
.sensor {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  min-height: 128px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.sensor:hover {

}
.sensor:hover .icon { color: var(--paper); }
.sensor:hover .unit { color: rgba(250,248,243,0.6); }
.sensor:hover .dot { background: var(--accent); }
.sensor.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.sensor.active .icon { color: var(--paper); }
.sensor.active .unit { color: rgba(250,248,243,0.6); }
.sensor.active .dot { background: var(--accent); }
.sensor .top-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.sensor .icon { width: 26px; height: 26px; color: var(--ink); transition: color 0.2s; }
.sensor .dot {

  border-radius: 50%;

  margin-top: 6px;
}
.sensor .name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.sensor .unit {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-mute);
  margin-top: 3px;

}
.sensor .sensor-dot-ok,
.sensor .sensor-dot-sim {
  width: 7px; height: 7px;
  border-radius: 50%;

  flex-shrink: 0;
}
.sensor .sensor-dot-ok {
  background: #18a04a;

}
.sensor .sensor-dot-sim {

  border: 1px dashed var(--ink-mute);
}
.sensor:hover .sensor-dot-ok,
.sensor.active .sensor-dot-ok { background: #4ade80; box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.2); }
.sensor:hover .sensor-dot-sim,
.sensor.active .sensor-dot-sim { border-color: rgba(250,248,243,0.5); }

/* ═══════════ DASHBOARD PANEL ═══════════ */
#dashboard-panel {
  display: none;
  margin-top: 36px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.dash-header {
  padding: 22px 28px;
  border-bottom: 1px solid var(--line-soft);
  display: flex;
  align-items: center;
  gap: 18px;
}
.dash-header .sensor-badge {
  width: 44px; height: 44px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 10px;
  display: grid;
  place-items: center;
}
.dash-header .sensor-badge svg { width: 22px; height: 22px; }
.dash-header .title-block h3 {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 26px;
  letter-spacing: -0.02em;
  line-height: 1;
}
.dash-header .title-block .sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 4px;
  letter-spacing: 0.04em;
}
.dash-header .live {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 11px;
  background: var(--bg);
  border-radius: 999px;
  color: var(--ink-soft);
}
.dash-header .live .blink {
  width: 7px; height: 7px;

  border-radius: 50%;

}
.dash-header .close-btn {
  width: 34px; height: 34px;

  place-items: center;

  color: var(--ink-soft);
}
.dash-header .close-btn:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.dash-stats {
  display: grid;

  border-bottom: 1px solid var(--line-soft);
}
.dash-stats .stat { padding: 22px 28px; border-right: 1px solid var(--line-soft); }
.dash-stats .stat:last-child { border-right: none; }
.dash-stats .stat .label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-mute);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.dash-stats .stat .value {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.02em;
}
.dash-stats .stat .value .unit {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-mute);
  margin-left: 4px;
  font-weight: 400;
}
.dash-stats .stat.current .value { color: var(--accent); }
.dash-stats .stat .trend {

  font-size: 11px;

}
.dash-stats .stat .trend.up { color: #18a04a; }
.dash-stats .stat .trend.down { color: var(--warn); }
.dash-chart-wrap { padding: 24px 28px 28px; position: relative; }
.dash-chart-wrap .range-tabs {

  gap: 4px;
  margin-bottom: 18px;
  justify-content: flex-end;
}
.range-tabs button {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 11px;
  border: 1px solid var(--line);

  color: var(--ink-soft);

}
.range-tabs button:hover { color: var(--ink); border-color: var(--ink-soft); }
.range-tabs button.on {

}
#chart-canvas { height: 300px !important; }

/* ═══════════ SIMULATION CONTENT GRID ═══════════ */
.content-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 14px;
}
.content-card {

  padding: 18px;

  transition: all 0.25s;

  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.content-card:hover { border-color: var(--ink); transform: translateY(-3px); }
.content-card .thumb {
  flex: 1;
  background: var(--bg-alt);
  border-radius: 8px;
  margin-bottom: 14px;
  display: grid;
  place-items: center;

.content-card:hover .thumb { background: var(--accent-soft); }
.content-card .thumb svg { width: 42%; height: 42%; color: var(--ink-soft); }
.content-card .meta {

}
.content-card .meta .title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
.content-card .meta .num { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); }

/* ═══════════ FOOTER ═══════════ */
footer {
  border-top: 1px solid var(--line);
  padding: 60px 0 40px;
  margin-top: 40px;
}
footer .foot-wrap {

  padding-bottom: 40px;

}
footer h4 {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.08em;

}
footer .brand .tag {
  font-family: var(--font-display);
  font-size: 28px;

  letter-spacing: -0.02em;

}
footer .brand .tag em { font-style: italic; color: var(--accent); }
footer .brand p { font-size: 13px; color: var(--ink-soft); max-width: 340px; margin: 0; }
footer ul { list-style: none; padding: 0; margin: 0; }
footer ul li {
  font-size: 13.5px;

}

/* ═══════════ LOADING / ERROR ═══════════ */
.loader {

}
.loader .spin {

}
@keyframes spin { to { transform: rotate(360deg); } }
.load-error {
  max-width: 620px;
  margin: 100px auto;
  padding: 40px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
}
.load-error h3 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  margin: 0 0 12px;
}
.load-error p { color: var(--ink-soft); font-size: 14px; line-height: 1.7; }
.load-error code {
  font-family: var(--font-mono);
  font-size: 12.5px;
  background: var(--bg);
  padding: 2px 7px;

}
.load-error .tip-box {
  margin-top: 18px;
  padding: 16px 18px;
  background: var(--bg);
  border-radius: 10px;
  border-left: 3px solid var(--accent);
  font-size: 13px;

}

.page-fade {
  animation: pageFade 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes pageFade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════ SENSOR DETAIL PAGE ═══════════ */
.sensor-page {
  padding: 44px 0 80px;
}
.back-link {
  display: inline-flex;

  gap: 10px;

}
.back-link:hover {

}
.back-link svg { width: 14px; height: 14px; }

.sensor-page .page-head {

.sensor-page .page-head h1 {

.sensor-page .page-head h1 .u {

.sensor-page .page-head .sub {

}
.sensor-page .page-head .live-big {

  font-size: 11.5px;

.sensor-page .page-head .live-big .blink {

.sensor-page .desc-box {

.sensor-page .stats-row {

.sensor-page .stat-card {

}
.sensor-page .stat-card.current { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.sensor-page .stat-card.current .label { color: rgba(250,248,243,0.55); }
.sensor-page .stat-card.current .value { color: var(--paper); }
.sensor-page .stat-card.current .value .u { color: rgba(250,248,243,0.5); }
.sensor-page .stat-card .label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);

}
.sensor-page .stat-card .value {
  font-family: var(--font-display);
  font-size: 40px;

.sensor-page .stat-card .value .u {

  font-size: 12px;
  color: var(--ink-mute);

.sensor-page .chart-card {

.sensor-page .chart-card .chart-top {

  justify-content: space-between;

}
.sensor-page .chart-card .chart-label {

.sensor-page .chart-card .chart-label strong {

#sensor-chart { height: 420px !important; }

.sensor-page .footer-meta {

  display: flex;

  font-size: 11px;

/* ═══════════ DASHBOARD IFRAME VIEW ═══════════ */
.dashview {
  padding: 44px 0 80px;
}
.dashview .view-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 24px;
  align-items: center;
  padding-bottom: 28px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.dashview .view-head .mark {
  width: 64px; height: 64px;
  border-radius: 16px;
  display: grid;
  place-items: center;
  background: var(--ink);
  color: var(--paper);
}
.dashview .view-head .mark.alt { background: var(--accent); }
.dashview .view-head .mark svg { width: 30px; height: 30px; }
.dashview .view-head h1 {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: clamp(32px, 4.2vw, 48px);
  letter-spacing: -0.025em;
  margin: 0;
  line-height: 1;
}
.dashview .view-head .sub {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
  margin-top: 8px;
}
.dashview .view-head .ext {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-soft);
  text-decoration: none;
  padding: 8px 13px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--paper);
  display: inline-flex;
  align-items: center;
  gap: 7px;
  transition: all 0.2s;
}
.dashview .view-head .ext:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.dashview .view-head .ext svg { width: 12px; height: 12px; }

.dashview .view-head .ext-group {
  display: flex;
  flex-direction: column;
  align-items: flex-end;

  max-width: 300px;
}
.dashview .view-head .ipad-notice {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-family: var(--font-kr);
  font-size: 11.5px;

  color: var(--ink-soft);
  background: var(--paper);
  border: 1px solid var(--line);

.dashview .view-head .ipad-notice b {

}
.dashview .view-head .ipad-notice .ipad-ico {

  height: 14px;

.dashview .frame-wrap {

.dashview .frame-wrap .frame-loading {

.dashview .frame-wrap .frame-loading .spin {

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 960px) {
  .concepts { grid-template-columns: repeat(2, 1fr); }
  .dash-banners { grid-template-columns: 1fr; }
  .sensor-grid { grid-template-columns: repeat(3, 1fr); }
  .content-grid { grid-template-columns: repeat(3, 1fr); }
  .dash-stats { grid-template-columns: 1fr 1fr; }
  .dash-stats .stat { border-right: none; border-bottom: 1px solid var(--line-soft); }
  .hero-meta { display: none; }
  footer .foot-wrap { grid-template-columns: 1fr 1fr; }
  .sensor-page .page-head { grid-template-columns: auto 1fr; }
  .sensor-page .page-head .live-big { grid-column: 1 / -1; justify-self: start; }
  .sensor-page .stats-row { grid-template-columns: 1fr 1fr; }
  #sensor-chart { height: 320px !important; }
  .dashview .view-head { grid-template-columns: auto 1fr; }
  .dashview .view-head .ext-group {
    grid-column: 1 / -1;
    align-items: flex-start;
    max-width: 100%;
  }
  .dashview .frame-wrap iframe { height: 680px; }

  /* Main section heads stack vertically and keep text left-aligned */
  .section-head {
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 32px;
  }
  .section-head .desc {
    max-width: 100%;
    text-align: left;
  }
}
@media (max-width: 560px) {
  .concepts { grid-template-columns: 1fr; }
  .sensor-grid { grid-template-columns: repeat(2, 1fr); }
  .content-grid { grid-template-columns: repeat(2, 1fr); }
  .container { padding: 0 20px; }

  /* Header — keep everything on ONE row, menu left-aligned after the logo */
  nav.top .wrap {
    padding: 14px 18px;
    gap: 18px;
  }
  nav.top .logo { font-size: 13px; gap: 7px; }
  nav.top .logo .dot { width: 8px; height: 8px; }
  nav.top ul {
    gap: 14px;
    font-size: 12.5px;
    flex-wrap: nowrap;
    white-space: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  nav.top ul::-webkit-scrollbar { display: none; }
  nav.top ul a.active::after { bottom: -4px; }

<!-- Header slot: header.html will be injected here -->

<!-- Main slot: home.html / science.html / simulation.html injected here -->

  <div class="loader"><div class="spin"></div>Loading…</div>

<script>
/* ═════════════════════════════════════════════
   Simple router: loads HTML partials into slots.
   - header.html is loaded once on boot
   - main slot is swapped based on hash (#home, #science, #simulation)
   ═════════════════════════════════════════════ */

// Load an HTML partial into a target element and re-execute its <script> tags
async function loadPartial(url, target) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    target.innerHTML = html;

    // Re-execute scripts inside the injected HTML
    target.querySelectorAll('script').forEach(oldScript => {
      const s = document.createElement('script');
      [...oldScript.attributes].forEach(a => s.setAttribute(a.name, a.value));
      s.textContent = oldScript.textContent;
      oldScript.replaceWith(s);
    });
    return true;
  } catch (err) {
    target.innerHTML = `
      <div class="load-error">
        <h3>파일을 불러올 수 없습니다</h3>
        <p><code>${url}</code> 을(를) 가져오는 중 오류가 발생했습니다: <b>${err.message}</b></p>
        <div class="tip-box">
          <b>💡 해결 방법</b><br>
          <code>index.html</code> 을 브라우저에서 바로 열면 보안 정책(CORS)으로 인해 파일이 로드되지 않을 수 있습니다.<br>
          아래 중 한 가지 방법으로 실행해 주세요:<br><br>
          • VS Code + <b>Live Server</b> 확장 설치 후 <code>index.html</code> 우클릭 → "Open with Live Server"<br>
          • 또는 폴더 안에서 터미널 실행 → <code>python -m http.server</code> 후 <code>http://localhost:8000</code> 접속
        </div>
      </div>`;
    return false;
  }
}

// Route definitions
const ROUTES = {
  home:       'home.html',
  science:    'science.html',
  simulation: 'simulation.html',
  sensor:     'sensor.html',
  dash:       'dashview.html'
};

// Before loading a new main page, run any cleanup the current page registered
function runCleanup() {
  if (typeof window.__pageCleanup === 'function') {
    try { window.__pageCleanup(); } catch (e) { /* ignore */ }
  }
  window.__pageCleanup = null;
}

// Load the main content for the current hash
async function routeMain() {
  runCleanup();
  const rawHash = (location.hash || '').replace(/^#/, '') || 'home';
  const [routeKey, param] = rawHash.split('/');
  const page = ROUTES[routeKey] || ROUTES.home;
  // Expose URL param to the loaded page (e.g. sensor key)
  window.__routeParam = param || null;

  const main = document.getElementById('main-slot');
  main.innerHTML = '<div class="loader"><div class="spin"></div>Loading…</div>';
  const ok = await loadPartial(page, main);
  if (ok) main.classList.remove('page-fade'), void main.offsetWidth, main.classList.add('page-fade');

  // Update active state in nav. Sensor detail and dashview pages highlight "과학실험".
  const activeKey = (routeKey === 'sensor' || routeKey === 'dash') ? 'science' : (ROUTES[routeKey] ? routeKey : 'home');
  document.querySelectorAll('[data-route]').forEach(el => {
    el.classList.toggle('active', el.dataset.route === activeKey);
  });
  // Scroll to top on page change (but not on initial load)
  if (window.__navigated) window.scrollTo({ top: 0, behavior: 'smooth' });
  window.__navigated = true;
}

// Bind navigation clicks after header is loaded
function bindNav() {
  document.querySelectorAll('[data-route]').forEach(el => {
    el.addEventListener('click', (e) => {
      const route = el.dataset.route;
      if (!route) return;
      e.preventDefault();
      if (location.hash === '#' + route) {
        // Already on this page — just scroll up
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        location.hash = route;
      }
    });
  });
}

// Boot sequence
(async function init() {
  const headerSlot = document.getElementById('header-slot');
  await loadPartial('header.html', headerSlot);
  bindNav();
  await routeMain();
  window.addEventListener('hashchange', routeMain);
})();
</script>
