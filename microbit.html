<script>
(function() {
  const FILE = '05_마이크로비트_단순표시.html';

  const iframe = document.getElementById('mbFrame');
  const loading = document.getElementById('mbLoading');

  iframe.addEventListener('load', () => {
    if (iframe.src && !iframe.src.endsWith('about:blank')) {
      loading.classList.add('hide');
    }
  });

  // Safety net — hide loader after 4s regardless
  setTimeout(() => loading.classList.add('hide'), 4000);

  iframe.src = FILE;

  // Cleanup on navigation away
  window.__pageCleanup = function() {
    try { iframe.src = 'about:blank'; } catch (e) {}
  };
})();
</script>
