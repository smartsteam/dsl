<section class="dashview microbit-page">
  <div class="container">
    <!-- Page header -->
    <div class="view-head">
      <div class="mark alt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="12" rx="3"/>
          <circle cx="8" cy="12" r="1.4" fill="currentColor"/>
          <circle cx="16" cy="12" r="1.4" fill="currentColor"/>
          <path d="M6 10 H7 M17 10 H18"/>
        </svg>
      </div>
      <div>
        <h1>마이크로비트 연동 대시보드</h1>
        <div class="sub">MICRO:BIT DASHBOARD · Web Bluetooth 실시간 연동</div>
      </div>
    </div>

    <!-- Dashboard rows -->
    <div class="mb-rows" id="mbRows"></div>

    <!-- Inline usage panel (shown when 이용방법 clicked) -->
    <div class="mb-howto" id="mbHowto" style="display:none;">
      <div class="mb-howto-head">
        <h3 id="mbHowtoTitle">이용 방법</h3>
        <button class="mb-close" type="button" onclick="closeMbHowto()" aria-label="닫기">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M3 3 L11 11 M11 3 L3 11"/>
          </svg>
        </button>
      </div>
      <div class="mb-howto-body" id="mbHowtoBody"></div>
    </div>

    <!-- Inline iframe panel (shown when dashboard card clicked) -->
    <div class="mb-frame-panel" id="mbFramePanel" style="display:none;">
      <div class="frame-wrap">
        <div class="frame-loading" id="mbFrameLoading">
          <div>
            <div class="spin"></div>
            Loading dashboard…
          </div>
        </div>
        <iframe id="mbFrame" title="Micro:bit Dashboard" src="about:blank" allow="bluetooth; serial"></iframe>
      </div>
      <div class="frame-meta">
        <div>SOURCE · <code id="mbFrameSource">—</code></div>
        <div>EMBEDDED · RENDERED INLINE</div>
      </div>
    </div>
  </div>
</section>

<style>
/* ── Dashboard rows ─────────────────────────────────────────── */
.microbit-page .mb-rows {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 24px;
}

.microbit-page .mb-row {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 20px 28px;
  display: grid;
  grid-template-columns: minmax(130px, 180px) 1fr;
  align-items: center;
  gap: 22px;
  transition: border-color 0.22s, box-shadow 0.22s;
}
.microbit-page .mb-row:hover {
  border-color: var(--ink-mute);
  box-shadow: 0 4px 14px rgba(22,22,19,0.04);
}

.microbit-page .mb-row.placeholder {
  border-style: dashed;
  border-color: var(--line);
  background: transparent;
}
.microbit-page .mb-row.placeholder:hover {
  border-color: var(--line);
  box-shadow: none;
}

.microbit-page .mb-row-label {
  font-family: var(--font-kr);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  padding-left: 8px;
  line-height: 1.25;
}
.microbit-page .mb-row-label .mb-row-sub {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--ink-mute);
  margin-top: 4px;
}
.microbit-page .mb-row.placeholder .mb-row-label {
  color: var(--ink-mute);
  font-weight: 600;
}

/* Action buttons inside a row */
.microbit-page .mb-actions {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
.microbit-page .mb-btn {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 10px;
  min-height: 78px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  text-decoration: none;
  color: var(--ink);
  font-family: var(--font-kr);
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -0.01em;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  line-height: 1.35;
  word-break: keep-all;
}
.microbit-page .mb-btn:hover {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--paper);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(22,22,19,0.12);
}
.microbit-page .mb-btn.mb-btn-hex {
  background: var(--accent-soft);
  border-color: #c4cbf5;
}
.microbit-page .mb-btn.mb-btn-hex:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--paper);
}
.microbit-page .mb-btn .mb-btn-ico {
  width: 18px;
  height: 18px;
  margin-bottom: 6px;
  color: currentColor;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.microbit-page .mb-btn:hover .mb-btn-ico { opacity: 1; }

.microbit-page .mb-row.placeholder .mb-btn {
  border-style: dashed;
  border-color: var(--line);
  color: var(--ink-mute);
  cursor: default;
  pointer-events: none;
  opacity: 0.55;
}

/* ── How-to inline panel ─────────────────────────────────────── */
.microbit-page .mb-howto {
  background: var(--paper);
  border: 1px solid var(--line);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-lg);
  padding: 24px 28px 26px;
  margin-bottom: 24px;
  animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.microbit-page .mb-howto-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line-soft);
}
.microbit-page .mb-howto-head h3 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 24px;
  letter-spacing: -0.02em;
  margin: 0;
}
.microbit-page .mb-close {
  width: 30px; height: 30px;
  border: 1px solid var(--line);
  background: var(--paper);
  border-radius: 50%;
  cursor: pointer;
  display: grid;
  place-items: center;
  color: var(--ink-soft);
  transition: all 0.18s;
}
.microbit-page .mb-close:hover {
  background: var(--ink); color: var(--paper); border-color: var(--ink);
}
.microbit-page .mb-close svg { width: 12px; height: 12px; }

.microbit-page .mb-howto-body { font-size: 14px; color: var(--ink-soft); line-height: 1.7; }
.microbit-page .mb-howto-body h4 {
  font-family: var(--font-kr);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin: 22px 0 10px;
  letter-spacing: -0.01em;
}
.microbit-page .mb-howto-body h4:first-child { margin-top: 0; }
.microbit-page .mb-howto-body ol {
  margin: 8px 0 14px;
  padding-left: 0;
  list-style: none;
  counter-reset: step;
}
.microbit-page .mb-howto-body ol li {
  counter-increment: step;
  position: relative;
  padding-left: 36px;
  margin-bottom: 10px;
  line-height: 1.65;
}
.microbit-page .mb-howto-body ol li::before {
  content: counter(step);
  position: absolute;
  left: 0; top: 1px;
  width: 24px; height: 24px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 50%;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  display: grid;
  place-items: center;
}
.microbit-page .mb-howto-body b { color: var(--ink); font-weight: 700; }
.microbit-page .mb-howto-body code {
  font-family: var(--font-mono);
  font-size: 12.5px;
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 4px;
  color: var(--ink);
  border: 1px solid var(--line-soft);
}
.microbit-page .mb-howto-body pre {
  background: #1e2d6b;
  color: #e8effe;
  border-radius: 10px;
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.6;
  overflow-x: auto;
  margin: 10px 0 16px;
}
.microbit-page .mb-howto-body .device-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin: 8px 0 6px;
}
.microbit-page .mb-howto-body .device-row > div {
  background: var(--bg);
  border: 1px solid var(--line-soft);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 13px;
}
.microbit-page .mb-howto-body .device-row b { display: block; margin-bottom: 4px; }
.microbit-page .mb-howto-body a { color: var(--accent); font-weight: 600; text-decoration: none; }
.microbit-page .mb-howto-body a:hover { text-decoration: underline; }
.microbit-page .mb-howto-body .tip-line {
  background: var(--bg);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 10px 14px;
  margin: 10px 0;
  font-size: 13px;
}

.microbit-page .mb-frame-panel {
  animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 1100px) {
  .microbit-page .mb-actions { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 960px) {
  .microbit-page .mb-row {
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 18px 20px;
    border-radius: 18px;
  }
  .microbit-page .mb-row-label { padding-left: 0; font-size: 19px; }
  .microbit-page .mb-actions { grid-template-columns: repeat(3, 1fr); }
  .microbit-page .mb-howto-body .device-row { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .microbit-page .mb-actions { grid-template-columns: repeat(2, 1fr); }
  .microbit-page .mb-btn { font-size: 12.5px; min-height: 68px; padding: 12px 8px; }
}
</style>

<script>
(function() {
  // Dashboard registry — append more entries here as new dashboards are built
  const DASHBOARDS = [
    {
      key: 'light',
      title: '빛의 세기',
      sub: 'LIGHT · LUX',
      file: '06_대시보드_이지_마빗_통합_V3.HTML',
      hexBle: 'microbit_light_무선.hex',
      hexUsb: 'microbit-light_유선.hex',
      howtoCode: 'bluetooth.startUartService()\nbasic.forever(function () {\n    bluetooth.uartWriteLine("" + (input.lightLevel()))\n    basic.pause(1000)\n})'
    }
    // 향후 추가될 대시보드:
    // { key:'temp', title:'온도', sub:'TEMPERATURE · °C', file:'…',
    //   hexBle:'…_무선.hex', hexUsb:'…_유선.hex', howtoCode:'…' },
  ];
  const PLACEHOLDER_TARGET = 4; // 화면에 노출할 총 행 수 (현재 + 향후)

  const rowsEl = document.getElementById('mbRows');

  // SVG icons for actions
  const ICO = {
    dash:  '<rect x="3" y="3" width="8" height="9" rx="1.2"/><rect x="13" y="3" width="8" height="5" rx="1.2"/><rect x="13" y="10" width="8" height="11" rx="1.2"/><rect x="3" y="14" width="8" height="7" rx="1.2"/>',
    open:  '<path d="M5 4 H4 V20 H20 V13 M9 4 H20 V14 M20 4 L11 13"/>',
    howto: '<circle cx="12" cy="12" r="9"/><path d="M9.5 9 a2.5 2.5 0 1 1 3.5 2.3 c-0.7 0.4 -1 1 -1 1.7 V14 M12 17 v0.1"/>',
    ble:   '<path d="M8 6 L16 12 L8 18 V6 L16 12"/>',
    usb:   '<rect x="8" y="3" width="8" height="14" rx="1.5"/><path d="M10 17 V21 H14 V17 M11 6 H13 M11 9 H13"/>'
  };

  // ─── Render rows ────────────────────────────────────────────
  function render() {
    rowsEl.innerHTML = '';

    DASHBOARDS.forEach(d => rowsEl.appendChild(makeRow(d)));

    // Placeholder rows for future dashboards
    const remaining = Math.max(0, PLACEHOLDER_TARGET - DASHBOARDS.length);
    for (let i = 0; i < remaining; i++) {
      rowsEl.appendChild(makePlaceholderRow());
    }
  }

  function makeRow(d) {
    const row = document.createElement('div');
    row.className = 'mb-row';

    row.innerHTML = `
      <div class="mb-row-label">
        ${d.title}
        <span class="mb-row-sub">${d.sub}</span>
      </div>
      <div class="mb-actions"></div>
    `;
    const actions = row.querySelector('.mb-actions');

    // 1) 대시보드 — opens iframe inline
    actions.appendChild(makeBtn({
      label: '대시보드',
      ico:   ICO.dash,
      onclick: () => openFrame(d)
    }));
    // 2) 새창에서열기
    actions.appendChild(makeBtn({
      label: '새창에서 열기',
      ico:   ICO.open,
      href:  d.file,
      target:'_blank'
    }));
    // 3) 이용방법
    actions.appendChild(makeBtn({
      label: '이용방법',
      ico:   ICO.howto,
      onclick: () => showHowto(d)
    }));
    // 4) 무선(블루투스)연결 HEX파일 다운로드
    actions.appendChild(makeBtn({
      label: '무선(블루투스)연결<br>HEX파일 다운로드',
      ico:   ICO.ble,
      href:  d.hexBle,
      download: d.hexBle,
      cls:   'mb-btn-hex'
    }));
    // 5) 유선(USB)연결 HEX파일 다운로드
    actions.appendChild(makeBtn({
      label: '유선(USB)연결<br>HEX파일 다운로드',
      ico:   ICO.usb,
      href:  d.hexUsb,
      download: d.hexUsb,
      cls:   'mb-btn-hex'
    }));

    return row;
  }

  function makePlaceholderRow() {
    const row = document.createElement('div');
    row.className = 'mb-row placeholder';
    row.innerHTML = `
      <div class="mb-row-label">
        Coming Soon
        <span class="mb-row-sub">대시보드 준비 중</span>
      </div>
      <div class="mb-actions">
        <div class="mb-btn">대시보드</div>
        <div class="mb-btn">새창에서 열기</div>
        <div class="mb-btn">이용방법</div>
        <div class="mb-btn">무선(블루투스)연결<br>HEX파일 다운로드</div>
        <div class="mb-btn">유선(USB)연결<br>HEX파일 다운로드</div>
      </div>
    `;
    return row;
  }

  function makeBtn(opts) {
    const a = document.createElement('a');
    a.className = 'mb-btn' + (opts.cls ? ' ' + opts.cls : '');
    a.innerHTML = `
      <svg class="mb-btn-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${opts.ico}</svg>
      <span>${opts.label}</span>
    `;
    if (opts.href) a.href = opts.href;
    if (opts.target) { a.target = opts.target; a.rel = 'noopener'; }
    if (opts.download) a.setAttribute('download', opts.download);
    if (opts.onclick) {
      a.href = '#';
      a.addEventListener('click', (e) => { e.preventDefault(); opts.onclick(); });
    }
    return a;
  }

  // ─── Inline iframe panel ────────────────────────────────────
  const framePanel  = document.getElementById('mbFramePanel');
  const frame       = document.getElementById('mbFrame');
  const frameLoad   = document.getElementById('mbFrameLoading');
  const frameSource = document.getElementById('mbFrameSource');

  frame.addEventListener('load', () => {
    if (frame.src && !frame.src.endsWith('about:blank')) {
      frameLoad.classList.add('hide');
    }
  });

  function openFrame(d) {
    framePanel.style.display = 'block';
    frameSource.textContent = d.file;
    frameLoad.classList.remove('hide');
    frame.src = d.file;
    setTimeout(() => frameLoad.classList.add('hide'), 4000);
    setTimeout(() => framePanel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
  }

  // ─── How-to inline panel ────────────────────────────────────
  const howto      = document.getElementById('mbHowto');
  const howtoTitle = document.getElementById('mbHowtoTitle');
  const howtoBody  = document.getElementById('mbHowtoBody');

  function showHowto(d) {
    howtoTitle.textContent = d.title + ' 대시보드 이용 방법';
    howtoBody.innerHTML = buildHowtoHtml(d);
    howto.style.display = 'block';
    setTimeout(() => howto.scrollIntoView({ behavior: 'smooth', block: 'start' }), 30);
  }
  window.closeMbHowto = function() { howto.style.display = 'none'; };

  function buildHowtoHtml(d) {
    return `
      <h4>1. 연결 방식에 맞는 Hex 파일 고르기</h4>
      <p>마이크로비트와 대시보드의 연결 방식에 따라 사용할 hex 파일이 다릅니다. 아래 두 파일 중 <b>한 가지</b>만 마이크로비트에 넣어 주세요.</p>
      <div class="device-row">
        <div><b>📶 무선(블루투스) 연결</b><code>${d.hexBle}</code><br><span style="color:var(--ink-mute);font-size:12px;">아이패드·휴대폰 등 무선으로 연결할 때 사용</span></div>
        <div><b>🔌 유선(USB) 연결</b><code>${d.hexUsb}</code><br><span style="color:var(--ink-mute);font-size:12px;">PC·노트북에 USB 케이블로 직접 연결할 때 사용</span></div>
      </div>

      <h4>2. Hex 파일을 마이크로비트에 넣기</h4>
      <ol>
        <li>위에서 고른 hex 파일에 해당하는 <b>HEX파일 다운로드</b> 버튼을 클릭해 파일을 받습니다.</li>
        <li>USB 케이블로 마이크로비트를 PC에 연결합니다. 컴퓨터에 <b>MICROBIT</b> 드라이브가 나타납니다.</li>
        <li>다운로드한 hex 파일을 <b>MICROBIT</b> 드라이브에 끌어다 놓습니다.</li>
        <li>마이크로비트의 노란 LED 깜빡임이 멈추면 자동으로 리셋되며 프로그램이 시작됩니다.</li>
      </ol>

      <h4>3. 대시보드와 연결하기</h4>
      <ol>
        <li><b>대시보드</b> 버튼을 클릭하거나 <b>새창에서 열기</b>로 페이지를 엽니다.</li>
        <li>오른쪽 위 <b>🔗 장치 연결</b> 버튼을 누릅니다.</li>
        <li>연결 방식 선택 화면에서 hex와 같은 방식인 <b>무선 연결</b> 또는 <b>유선 연결</b>을 선택합니다.</li>
        <li>브라우저 팝업에서 본인의 마이크로비트(<code>BBC micro:bit [xxxxx]</code>)를 선택합니다.</li>
        <li>연결되면 <b>▶ 수신 시작</b> 버튼을 눌러 실시간 측정값을 확인합니다.</li>
      </ol>

      <h4>4. 기기별 접속 방법</h4>
      <div class="device-row">
        <div><b>📱 iPhone · iPad</b>블루투스 연결 시 <b>Bluefy 앱</b> 설치 후 이용하세요. (무선 hex 사용)</div>
        <div><b>🤖 Android</b><b>크롬 브라우저</b>로 접속해 주세요. (무선 hex 사용)</div>
        <div><b>💻 PC · 노트북</b>크롬 브라우저 + USB(유선 hex) 또는 블루투스(무선 hex)</div>
      </div>

      <h4>5. 직접 hex를 만들고 싶다면 (참고)</h4>
      <p>제공된 hex 파일 대신 <a href="https://makecode.microbit.org" target="_blank" rel="noopener">makecode.microbit.org</a>에서 직접 작성할 수도 있습니다. (무선 연결용 예시 코드)</p>
      <ol>
        <li>새 프로젝트 → ⚙️ → <b>확장</b> → <b>bluetooth</b> 추가</li>
        <li>⚙️ → <b>프로젝트 설정</b> → <b>No Pairing Required</b> 선택<span style="color:var(--ink-mute);font-size:12px;"> (가장 자주 빠뜨리는 단계)</span></li>
        <li><b>{} JavaScript</b> 모드로 전환 후 코드를 모두 지우고 아래 코드를 붙여넣습니다:</li>
      </ol>
      <pre>${escapeHtml(d.howtoCode)}</pre>
      <ol start="4">
        <li><b>다운로드</b> 버튼을 눌러 .hex 파일을 받고 <b>MICROBIT</b> 드라이브에 넣습니다.</li>
        <li>마이크로비트 뒷면 <b>리셋</b> 버튼을 눌러 새 프로그램으로 부팅합니다.</li>
      </ol>

      <div class="tip-line">
        💡 연결이 안 될 때는 다른 페이지에서 사용 중인 BLE 연결을 모두 해제하고, 마이크로비트의 전원을 다시 넣어 주세요. 무선/유선 hex를 잘못 고르면 연결되지 않으니, 같은 방식으로 다시 시도해 주세요.
      </div>
    `;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ─── Init ───────────────────────────────────────────────────
  render();

  window.__pageCleanup = function() {
    try { frame.src = 'about:blank'; } catch (e) {}
  };
})();
</script>
